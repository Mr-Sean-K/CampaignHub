<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CampaignHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">CampaignHub</a>
      <div class="d-flex gap-3">
        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="nav-link" href="{% url 'campaign_list' %}">Campaigns</a>
        <a class="nav-link" href="{% url 'task_list' %}">Tasks</a>
        <a class="nav-link" href="{% url 'client_list' %}">Clients</a>
        <a class="nav-link" href="{% url 'staff_list' %}">Staff</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="btn btn-link nav-link p-0" type="submit">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
