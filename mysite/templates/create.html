{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">{{ title }}</h3>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success" type="submit">Save</button>
      <a class="btn btn-secondary" href="{% url 'dashboard' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
