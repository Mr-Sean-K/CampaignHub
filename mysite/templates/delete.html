{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">{{ title }}</h3>
<p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger" type="submit">Yes, delete</button>
  <a class="btn btn-secondary" href="{% url 'dashboard' %}">Cancel</a>
</form>
{% endblock %}
