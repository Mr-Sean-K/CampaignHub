{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Staff</h3>
  <a class="btn btn-primary" href="{% url 'staff_create' %}">New Staff Member</a>
</div>

<table class="table table-bordered bg-white">
  <thead>
    <tr><th>Username</th><th>Email</th><th>Role</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for s in staff %}
      <tr>
        <td>{{ s.username }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.get_role_display }}</td>
        <td>{{ s.is_active }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" href="{% url 'staff_edit' s.id %}">Edit</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'staff_delete' s.id %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="5" class="text-muted">No staff found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
