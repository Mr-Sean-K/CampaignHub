{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Clients</h3>
  <a class="btn btn-primary" href="{% url 'client_create' %}">New Client</a>
</div>

<table class="table table-bordered bg-white">
  <thead>
    <tr><th>Name</th><th>Email</th><th>Company</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for c in clients %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.company_name }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" href="{% url 'client_edit' c.id %}">Edit</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'client_delete' c.id %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="4" class="text-muted">No clients found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
