{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Campaigns</h3>
  <a class="btn btn-primary" href="{% url 'campaign_create' %}">New Campaign</a>
</div>

<table class="table table-bordered bg-white">
  <thead>
    <tr><th>Name</th><th>Client</th><th>Status</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for c in campaigns %}
      <tr>
        <td>{{ c.campaign_name }}</td>
        <td>{{ c.client.name }}</td>
        <td>{{ c.status }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" href="{% url 'campaign_edit' c.id %}">Edit</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'campaign_delete' c.id %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="4" class="text-muted">No campaigns found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
